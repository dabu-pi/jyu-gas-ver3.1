<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>実来院月スキャン — JREC-01</title>
  <style>
    body { font-family: monospace; background: #111; color: #eee; padding: 16px; font-size: 13px; line-height: 1.6; }
    #status { color: #ff0; }
    .found { color: #0f0; }
    .none  { color: #888; }
    #json-output { display: none; }
  </style>
</head>
<body>
  <div id="status">スキャン中... (直近<?= lookback ?>か月)</div>
  <div id="content"></div>
  <div id="json-output"></div>
  <script>
    window.addEventListener("load", function() {
      google.script.run
        .withSuccessHandler(function(res) {
          document.getElementById("status").textContent = "完了";
          var html = "";
          if (res.ok && res.months && res.months.length > 0) {
            res.months.forEach(function(m) {
              html += "<div class='found'>FOUND: " + m.ym + " (" + m.patientCount + " 患者)</div>";
            });
          } else {
            html = "<div class='none'>保険来院がある月が見つかりませんでした</div>";
          }
          document.getElementById("content").innerHTML = html;
          document.getElementById("json-output").textContent = JSON.stringify(res);
          document.getElementById("json-output").setAttribute("data-ready", "1");
        })
        .withFailureHandler(function(e) {
          document.getElementById("status").textContent = "ERROR: " + e.message;
          document.getElementById("json-output").textContent = JSON.stringify({ ok: false, error: e.message });
          document.getElementById("json-output").setAttribute("data-ready", "1");
        })
        .findRecentMonthsWithClaims_V3(<?= lookback ?>);
    });
  </script>
</body>
</html>
