<body>
  <nav class="web-nav">
    <a href="<?= appBaseUrl ?>?page=home" target="_top">🏠 HOME</a>
    <a href="<?= appBaseUrl ?>?page=search" target="_top">患者検索</a>
    <a href="<?= appBaseUrl ?>?page=monthlyClaims" target="_top" class="active">月次申請</a>
    <a href="<?= appBaseUrl ?>?page=selfpay" target="_top">自費明細</a>
  </nav>
  <div class="page-header">
    <h1>月次申請 — 対象者一覧</h1>
    <p>対象月を選択して、申請対象患者と集計金額を確認します。</p>
  </div>

  <div class="search-box">
    <label for="ym-input">対象月</label>
    <input type="month" id="ym-input">
    <button class="btn btn-primary" id="search-btn" onclick="doSearch()">一覧を取得</button>
  </div>

  <div id="error-box"></div>
  <div id="loading">読み込み中...</div>
  <div id="empty-msg">指定月に保険来院がある患者はいませんでした。</div>
  <div class="result-header" id="result-header"></div>

  <div class="note-box" id="note-box" style="display:none">
    ⚠️ 要確認フラグがある患者は月次申請前にスプレッドシートで内容を確認してください。<br>
    「請求確定」は Sheets UI で確認後に行ってください。
  </div>

  <div class="table-wrap" id="table-wrap" style="display:none">
    <table id="result-table">
      <thead>
        <tr>
          <th>患者ID</th>
          <th>氏名</th>
          <th style="text-align:right">来院数</th>
          <th style="text-align:right">来院合計</th>
          <th style="text-align:right">窓口負担</th>
          <th style="text-align:right">保険請求</th>
          <th style="text-align:center">要確認</th>
          <th style="text-align:center">状態</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="result-tbody"></tbody>
      <tfoot id="result-tfoot"></tfoot>
    </table>
  </div>

  <script>
    var APP_BASE_URL = "<?= appBaseUrl ?>";

    (function() {
      var d = new Date();
      var mm = String(d.getMonth() + 1).padStart(2, "0");
      document.getElementById("ym-input").value = d.getFullYear() + "-" + mm;
    })();

    function esc(s) {
      return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }
    function yen(n) { return "¥" + Number(n || 0).toLocaleString(); }

    function doSearch() {
      var ym = document.getElementById("ym-input").value;
      if (!ym) { showError("対象月を選択してください。"); return; }

      var btn = document.getElementById("search-btn");
      btn.disabled = true;
      showLoading(true);
      clearResult();

      google.script.run
        .withSuccessHandler(function(res) { btn.disabled = false; showLoading(false); onResult(res, ym); })
        .withFailureHandler(function(err) { btn.disabled = false; showLoading(false); showError("GAS エラー: " + err.message); })
        .getMonthlyClaimList_V3(ym);
    }

    function onResult(res, ym) {
      if (!res.ok) { showError(res.message || "取得に失敗しました"); return; }

      var patients = res.patients || [];
      if (patients.length === 0) {
        document.getElementById("empty-msg").style.display = "block";
        return;
      }

      var hasCheck = patients.some(function(p) { return p.needCheckCount > 0; });
      if (hasCheck) document.getElementById("note-box").style.display = "block";

      var rh = document.getElementById("result-header");
      rh.style.display = "block";
      rh.textContent = ym + " — " + patients.length + " 名";

      var tbody = document.getElementById("result-tbody");
      var sumVt = 0, sumWp = 0, sumCp = 0;

      patients.forEach(function(p) {
        sumVt += p.visitTotal; sumWp += p.windowPay; sumCp += p.claimPay;
        var ncHtml = p.needCheckCount > 0
          ? '<span class="badge badge-check">要確認 ' + p.needCheckCount + '件</span>'
          : '<span style="color:#888;font-size:12px">—</span>';
        var stHtml = p.visitCount === 0
          ? '<span class="badge badge-novisit">来院なし</span>'
          : p.isReadyForClaim
            ? '<span class="badge badge-ready">確認OK</span>'
            : '<span class="badge badge-check">要確認</span>';
        var detailUrl = APP_BASE_URL + "?page=monthlyClaimDetail&patientId=" + encodeURIComponent(p.patientId) + "&ym=" + encodeURIComponent(p.ym || ym);

        var tr = document.createElement("tr");
        tr.innerHTML =
          "<td>" + esc(p.patientId) + "</td>" +
          "<td>" + esc(p.patientName) + "</td>" +
          "<td class='amt'>" + p.visitCount + "</td>" +
          "<td class='amt'>" + yen(p.visitTotal) + "</td>" +
          "<td class='amt'>" + yen(p.windowPay) + "</td>" +
          "<td class='amt'>" + yen(p.claimPay) + "</td>" +
          "<td style='text-align:center'>" + ncHtml + "</td>" +
          "<td style='text-align:center'>" + stHtml + "</td>" +
          "<td><a class='link-detail' href='" + detailUrl + "' target='_top'>詳細 →</a></td>";
        tbody.appendChild(tr);
      });

      // 合計行
      var tfoot = document.getElementById("result-tfoot");
      tfoot.innerHTML =
        "<tr><td colspan='3'>合計</td>" +
        "<td class='amt'>" + yen(sumVt) + "</td>" +
        "<td class='amt'>" + yen(sumWp) + "</td>" +
        "<td class='amt'>" + yen(sumCp) + "</td>" +
        "<td colspan='3'></td></tr>";

      document.getElementById("table-wrap").style.display = "block";
    }

    function showLoading(on) {
      document.getElementById("loading").style.display = on ? "block" : "none";
    }
    function showError(msg) {
      var el = document.getElementById("error-box");
      el.textContent = msg;
      el.style.display = "block";
    }
    function clearResult() {
      document.getElementById("error-box").style.display = "none";
      document.getElementById("empty-msg").style.display = "none";
      document.getElementById("note-box").style.display = "none";
      document.getElementById("result-header").style.display = "none";
      document.getElementById("table-wrap").style.display = "none";
      document.getElementById("result-tbody").innerHTML = "";
      document.getElementById("result-tfoot").innerHTML = "";
    }
  </script>
</body>
</html>
