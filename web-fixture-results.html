<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Fixture テスト結果 — JREC-01</title>
  <style>
    body { font-family: monospace; background: #111; color: #0f0; padding: 16px; font-size: 13px; line-height: 1.6; }
    #status { color: #ff0; }
    .pass { color: #0f0; }
    .fail { color: #f55; }
    #summary { font-size: 16px; font-weight: bold; margin-top: 12px; }
  </style>
</head>
<body>
  <div id="status">実行中...</div>
  <div id="results"></div>
  <div id="summary"></div>
  <div id="json-output" style="display:none"></div>

  <script>
    window.addEventListener("load", function() {
      google.script.run
        .withSuccessHandler(function(res) {
          document.getElementById("status").textContent = "完了";
          var html = "";
          (res.results || []).forEach(function(r) {
            var cls = r.pass ? "pass" : "fail";
            var mark = r.pass ? "PASS" : "FAIL";
            html += "<div class='" + cls + "'>[" + mark + "] " + r.testId + (r.diff ? ": " + r.diff : "") + "</div>";
          });
          document.getElementById("results").innerHTML = html;
          document.getElementById("summary").textContent =
            "PASS: " + (res.passCount || 0) + "  FAIL: " + (res.failCount || 0) + "  TOTAL: " + (res.total || 0);
          // machine-readable output for Playwright
          document.getElementById("json-output").textContent = JSON.stringify(res);
          document.getElementById("json-output").setAttribute("data-ready", "1");
        })
        .withFailureHandler(function(e) {
          document.getElementById("status").textContent = "ERROR: " + e.message;
          document.getElementById("json-output").textContent = JSON.stringify({ ok: false, error: e.message });
          document.getElementById("json-output").setAttribute("data-ready", "1");
        })
        .runFixtureSuiteWeb_V3();
    });
  </script>
</body>
</html>
